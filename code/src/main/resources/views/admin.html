<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-2: #151515;
            --line: #2a2a2a;
            --text-display: #f3f3f3;
            --text-primary: #dcdcdc;
            --text-secondary: #9a9a9a;
            --text-disabled: #676767;
            --ok: #32a852;
            --warn: #c78f1e;
            --alert: #d71921;
        }

        [data-theme="light"] {
            --bg: #f2f0eb;
            --surface: #ffffff;
            --surface-2: #faf8f3;
            --line: #d8d3c8;
            --text-display: #141414;
            --text-primary: #242424;
            --text-secondary: #636363;
            --text-disabled: #949494;
            --ok: #2c8947;
            --warn: #a06a00;
            --alert: #c4121c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text-primary);
            font-family: "Space Grotesk", sans-serif;
            min-height: 100vh;
            letter-spacing: 0.01em;
        }

        .shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 18px 48px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 42px;
        }

        .headline {
            margin: 0;
            color: var(--text-display);
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1;
            letter-spacing: 0.015em;
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--text-secondary);
            font-size: 0.86rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-family: "Space Mono", monospace;
        }

        .meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        .meta-row {
            color: var(--text-secondary);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-family: "Space Mono", monospace;
        }

        .dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            margin-right: 7px;
            border-radius: 999px;
            background: var(--ok);
            vertical-align: baseline;
        }

        .theme-toggle {
            border: 1px solid var(--line);
            background: transparent;
            color: var(--text-primary);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-family: "Space Mono", monospace;
            cursor: pointer;
        }

        .hero-metric {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            border: 1px solid var(--line);
            background: var(--surface);
            margin-bottom: 22px;
        }

        .hero-value {
            padding: 30px 24px;
            border-right: 1px solid var(--line);
        }

        .hero-label {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-family: "Space Mono", monospace;
        }

        .hero-number {
            margin: 12px 0 0;
            color: var(--text-display);
            font-size: clamp(2.8rem, 8vw, 5rem);
            line-height: 0.95;
            font-weight: 700;
        }

        .hero-breakdown {
            padding: 22px 24px;
            display: grid;
            gap: 14px;
            align-content: center;
        }

        .mini-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid var(--line);
            padding-bottom: 9px;
        }

        .mini-label {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-family: "Space Mono", monospace;
        }

        .mini-value {
            margin: 0;
            color: var(--text-display);
            font-size: 1.32rem;
            font-weight: 500;
        }

        .table-wrap {
            border: 1px solid var(--line);
            background: var(--surface-2);
            overflow-x: auto;
        }

        .table-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-bottom: 1px solid var(--line);
        }

        .table-title {
            margin: 0;
            color: var(--text-display);
            font-size: 1rem;
            letter-spacing: 0.02em;
        }

        .table-note {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.74rem;
            text-transform: uppercase;
            letter-spacing: 0.13em;
            font-family: "Space Mono", monospace;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 780px;
        }

        th,
        td {
            text-align: left;
            padding: 11px 16px;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
        }

        th {
            color: var(--text-secondary);
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-family: "Space Mono", monospace;
            font-weight: 400;
        }

        td {
            color: var(--text-primary);
            font-size: 0.92rem;
        }

        .muted {
            color: var(--text-secondary);
        }

        .value-strong {
            color: var(--text-display);
            font-weight: 700;
        }

        .country-pill {
            display: inline-block;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 2px 9px;
            font-size: 0.72rem;
            font-family: "Space Mono", monospace;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        @media (max-width: 980px) {
            .hero-metric {
                grid-template-columns: 1fr;
            }

            .hero-value {
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }
        }

        @media (max-width: 640px) {
            .shell {
                padding: 18px 12px 32px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
                margin-bottom: 30px;
            }

            .meta {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body data-theme="dark">
<main class="shell">
    <section class="topbar">
        <div>
            <h1 class="headline">DASHBOARD</h1>
            <p class="subtitle">Bot activity & user statistics</p>
        </div>
        <div class="meta">
            <div class="meta-row"><span class="dot"></span>PANEL</div>
            <div class="meta-row">UPDATED <span id="lastUpdate">--</span></div>
            <button id="themeToggle" class="theme-toggle" type="button">Switch Theme</button>
        </div>
    </section>

    <section class="hero-metric">
        <div class="hero-value">
            <p class="hero-label">Total messages processed</p>
            <p class="hero-number" id="totalMessages">0</p>
        </div>
        <div class="hero-breakdown">
            <div class="mini-row">
                <p class="mini-label">Total users</p>
                <p class="mini-value" id="totalUsers">0</p>
            </div>
            <div class="mini-row">
                <p class="mini-label">Average / user</p>
                <p class="mini-value" id="avgMessages">0</p>
            </div>
            <div class="mini-row" style="border-bottom: 0; padding-bottom: 0;">
                <p class="mini-label">Active languages</p>
                <p class="mini-value" id="activeCountries">0</p>
            </div>
        </div>
    </section>

    <section class="table-wrap">
        <div class="table-head">
            <h2 class="table-title">User activity table</h2>
            <p class="table-note">Ordered by message volume</p>
        </div>
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Username</th>
                <th>Language</th>
                <th>Messages</th>
                <th>Last active</th>
            </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </section>
</main>

<script>
    const users = {{!user_data}};

    document.addEventListener("DOMContentLoaded", () => {
        updateLastUpdatedTime();
        updateStats();
        initTable();
        setupThemeToggle();
    });

    function updateLastUpdatedTime() {
        const el = document.getElementById("lastUpdate");
        el.textContent = new Date().toLocaleString();
    }

    function updateStats() {
        const totalUsers = users.length;
        const totalMessages = users.reduce((sum, user) => sum + safeNumber(user.messageCount), 0);
        const avgMessages = totalUsers > 0 ? Math.round(totalMessages / totalUsers) : 0;
        const activeCountries = new Set(users.map((u) => (u.languageCode || "").trim()).filter(Boolean)).size;

        setText("totalUsers", formatNumber(totalUsers));
        setText("totalMessages", formatNumber(totalMessages));
        setText("avgMessages", formatNumber(avgMessages));
        setText("activeCountries", formatNumber(activeCountries));
    }

    function initTable() {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        const sortedUsers = [...users].sort((a, b) => safeNumber(b.messageCount) - safeNumber(a.messageCount));
        sortedUsers.forEach((user) => {
            const row = document.createElement("tr");
            const firstName = (user.firstName || "").trim();
            const lastName = (user.lastName || "").trim();
            const fullName = `${firstName} ${lastName}`.trim() || "Unknown";
            const username = (user.userName || "").trim();
            const country = (user.languageCode || "n/a").toUpperCase();
            const messageCount = safeNumber(user.messageCount);
            const lastActiveDate = parseDate(user.lastMessageTime);
            const dateText = lastActiveDate ? lastActiveDate.toLocaleDateString() : "N/A";
            const timeText = lastActiveDate ? lastActiveDate.toLocaleTimeString() : "N/A";

            row.innerHTML = `
                <td>${escapeHtml(fullName)}</td>
                <td class="muted">${username ? `@${escapeHtml(username)}` : "-"}</td>
                <td><span class="country-pill">${escapeHtml(country)}</span></td>
                <td class="value-strong">${formatNumber(messageCount)}</td>
                <td><span>${dateText}</span> <span class="muted">${timeText}</span></td>
            `;

            tableBody.appendChild(row);
        });
    }

    function setupThemeToggle() {
        const button = document.getElementById("themeToggle");
        button.addEventListener("click", () => {
            const body = document.body;
            body.dataset.theme = body.dataset.theme === "dark" ? "light" : "dark";
        });
    }

    function updateBar(id, value, max) {
        const element = document.getElementById(id);
        const percent = Math.max(0, Math.min(100, (safeNumber(value) / safeNumber(max)) * 100));
        element.style.width = `${percent}%`;
    }

    function isWithinHours(rawDate, hours) {
        const d = parseDate(rawDate);
        if (!d) {
            return false;
        }
        const diff = Date.now() - d.getTime();
        return diff >= 0 && diff <= hours * 60 * 60 * 1000;
    }

    function parseDate(rawDate) {
        if (!rawDate) {
            return null;
        }
        const d = new Date(rawDate);
        return Number.isNaN(d.getTime()) ? null : d;
    }

    function safeNumber(value) {
        const n = Number(value);
        return Number.isFinite(n) ? n : 0;
    }

    function formatNumber(value) {
        return safeNumber(value).toLocaleString();
    }

    function setText(id, value) {
        const el = document.getElementById(id);
        if (el) {
            el.textContent = value;
        }
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }
</script>
</body>
</html>
